<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unique Perfumes - Luxury Collection</title>
    <style>
        /* Modern Black & White Luxury Theme */
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Times New Roman', serif;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        header {
            padding: 50px 20px;
            border-bottom: 1px solid #1a1a1a;
        }

        .logo {
            max-width: 280px;
            height: auto;
            /* عملت Filter عشان اللوجو ينور أبيض على الخلفية السوداء */
            filter: brightness(0) invert(1);
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
            padding: 60px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .product-card {
            background-color: #080808;
            border: 1px solid #151515;
            padding: 25px;
            transition: all 0.5s ease;
        }

        .product-card:hover {
            border-color: #ffffff;
            transform: translateY(-10px);
            background-color: #111;
        }

        .product-card img {
            width: 100%;
            height: 400px;
            object-fit: contain;
            margin-bottom: 25px;
            /* الصور هتظهر أبيض وأسود ولما تقف عليها تظهر ألوانها */
            filter: grayscale(100%);
            transition: 0.5s;
        }

        .product-card:hover img {
            filter: grayscale(0%);
        }

        .product-name {
            font-size: 1.2rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .brand-name {
            font-size: 0.85rem;
            color: #888;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <header>
        <img src="Uniq perfmes/9034.png" alt="Unique Perfumes" class="logo">
    </header>

    <div class="gallery">
        <div class="product-card">
            <img src="Uniq perfmes/9030.jpg" alt="Le Male Le Parfum">
            <div class="product-name">Le Male Le Parfum</div>
            <div class="brand-name">JEAN PAUL GAULTIER</div>
        </div>

        <div class="product-card">
            <img src="Uniq perfmes/9031.jpg" alt="Versace Eros">
            <div class="product-name">Eros</div>
            <div class="brand-name">VERSACE</div>
        </div>

        <div class="product-card">
            <img src="Uniq perfmes/9032.jpg" alt="YSL MYSLF">
            <div class="product-name">MYSLF</div>
            <div class="brand-name">YVES SAINT LAURENT</div>
        </div>

        <div class="product-card">
            <img src="Uniq perfmes/9033.jpg" alt="Y Eau de Parfum">
            <div class="product-name">Y Le Parfum</div>
            <div class="brand-name">YVES SAINT LAURENT</div>
        </div>
    </div>

</body>
</html>
