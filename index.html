<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unique Perfumes | Essence of Elegance</title>
    <style>
        /* Global Styles */
        body { font-family: sans-serif; margin: 0; text-align: center; background: #fff; }
        nav { display: flex; justify-content: space-around; align-items: center; padding: 20px; border-bottom: 1px solid #eee; }
        .logo { height: 50px; }
        .hero { width: 100%; height: 400px; background: #f4f4f4; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .hero img { width: 100%; object-fit: cover; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; padding: 40px; }
        .card { border: 1px solid #eee; padding: 15px; }
        .card img { width: 100%; height: 200px; object-fit: contain; }
        footer { background: #111; color: #fff; padding: 40px; margin-top: 40px; }
    </style>
</head>
<body>

    <nav>
        <img src="Gemini_Generated_Image_5gyef...jpg" class="logo" alt="Logo">
        <div>Home | Shop | About</div>
    </nav>

    <div class="hero">
        <img src="2c0ad02e3e7619b20ad0d8334fc...jpg" alt="Hero">
    </div>

    <div class="grid">
        <div class="card">
            <img src="e1c1e42f2a94711da49686e8b171b...jpg">
            <h4>Product 1</h4>
        </div>
        <div class="card">
            <img src="ef4fcda30a8be27a848eb98e727...jpg">
            <h4>Product 2</h4>
        </div>
        <div class="card">
            <img src="f4b310938c9391058623879c583...jpg">
            <h4>Product 3</h4>
        </div>
    </div>

    <footer>
        Unique Perfumes © 2026
    </footer>

</body>
</html>
