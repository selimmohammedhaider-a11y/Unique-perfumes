<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unique Perfumes - Essence of Elegance</title>
    <style>
        /* ستايل المينيماليزم الفخم - أبيض وأسود */
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Times New Roman', serif;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        header {
            padding: 60px 20px;
            border-bottom: 1px solid #1a1a1a;
        }

        .logo {
            max-width: 300px;
            height: auto;
            /* عملت invert عشان اللوجو يظهر أبيض على الأسود */
            filter: brightness(0) invert(1);
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 40px;
            padding: 60px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .product-card {
            background-color: #050505;
            border: 1px solid #1a1a1a;
            padding: 20px;
            transition: all 0.4s ease;
            position: relative;
        }

        .product-card:hover {
            border-color: #ffffff;
            transform: translateY(-10px);
        }

        .product-card img {
            width: 100%;
            height: 380px;
            object-fit: contain;
            margin-bottom: 25px;
            /* تأثير الأبيض والأسود اللي بيقلب ألوان عند اللمس */
            filter: grayscale(100%);
            transition: 0.6s ease;
        }

        .product-card:hover img {
            filter: grayscale(0%);
        }

        .product-name {
            font-size: 1.1rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 5px;
            color: #fff;
        }

        .brand-label {
            font-size: 0.8rem;
            color: #666;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <header>
        <img src="9034.png" alt="Unique Perfumes Logo" class="logo">
    </header>

    <div class="gallery">
        <div class="product-card">
            <img src="9030.jpg" alt="Jean Paul Gaultier">
            <div class="product-name">Le Male Le Parfum</div>
            <div class="brand-label">JEAN PAUL GAULTIER</div>
        </div>

        <div class="product-card">
            <img src="9031.jpg" alt="Versace Eros">
            <div class="product-name">Eros</div>
            <div class="brand-label">VERSACE</div>
        </div>

        <div class="product-card">
            <img src="9032.jpg" alt="YSL MYSLF">
            <div class="product-name">MYSLF</div>
            <div class="brand-label">YVES SAINT LAURENT</div>
        </div>

        <div class="product-card">
            <img src="9033.jpg" alt="YSL Y">
            <div class="product-name">Y Le Parfum</div>
            <div class="brand-label">YVES SAINT LAURENT</div>
        </div>
    </div>

</body>
</html>
